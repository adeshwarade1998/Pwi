kind = "web"
previewPath = "/"
title = "PhonicsWorld"
version = "1.0.0"
id = "artifacts/phonicsworld"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22818

[services.development]
run = "pnpm --filter @workspace/phonicsworld run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phonicsworld", "run", "build" ]
publicDir = "artifacts/phonicsworld/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22818"
BASE_PATH = "/"
